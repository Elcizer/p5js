<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 포트폴리오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nanum+Gothic:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.22);
      --text-primary: #f0ede6;
      --text-muted: #7a7773;
      --accent: #c8b89a;
      --label-1: #e8b89a;
      --label-2: #a8c4b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Nanum Gothic', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    header {
      padding: 64px 48px 0;
      max-width: 1100px;
      margin: 0 auto;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--text-muted);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 20px;
      line-height: 1.7;
      max-width: 480px;
    }

    .divider {
      max-width: 1100px;
      margin: 40px auto 0;
      padding: 0 48px;
      border-bottom: 1px solid var(--border);
    }

    .grid-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    .grid-label-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 8px;
    }

    .grid-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    .cell:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* iframe preview — 항상 보임 */
    .cell-preview {
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      background: var(--surface2);
    }

    .cell-preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 600px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }

    .cell-preview iframe.interactive {
      pointer-events: auto;
    }

    /* 카드 하단 메타 */
    .cell-meta {
      padding: 14px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .cell-info { display: flex; flex-direction: column; gap: 3px; }

    .cell-number {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .cell-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .cell-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .cell-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid;
    }

    .tag-static {
      color: var(--label-1);
      border-color: rgba(232,184,154,0.3);
      background: rgba(232,184,154,0.06);
    }

    .tag-dynamic {
      color: var(--label-2);
      border-color: rgba(168,196,184,0.3);
      background: rgba(168,196,184,0.06);
    }

    .open-link {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .open-link:hover { color: var(--text-primary); }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    .footer-dots { display: flex; gap: 6px; }
    .footer-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); opacity: 0.4; }
    .footer-dot:nth-child(2) { opacity: 0.6; }
    .footer-dot:nth-child(3) { opacity: 0.9; background: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.6s ease both; }
    .divider { animation: fadeUp 0.6s 0.1s ease both; }
    .grid-section { animation: fadeUp 0.6s 0.2s ease both; }
    .cell:nth-child(1) { animation: fadeUp 0.5s 0.25s ease both; }
    .cell:nth-child(2) { animation: fadeUp 0.5s 0.35s ease both; }
    .cell:nth-child(3) { animation: fadeUp 0.5s 0.45s ease both; }
    .cell:nth-child(4) { animation: fadeUp 0.5s 0.55s ease both; }

    @media (max-width: 640px) {
      header, .divider, .grid-section, footer { padding-left: 24px; padding-right: 24px; }
      #projects { grid-template-columns: 1fr; }
      .grid-label-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">p5.js Creative Coding</p>
  <h1>나의 작품들</h1>
  <p class="subtitle">과제 1~4 작품 모음집. 정적 그래픽부터 인터랙티브 애니메이션까지.</p>
</header>

<div class="divider"></div>

<section class="grid-section">
  <div class="grid-label-row">
    <span class="grid-label">정적(Static)</span>
    <span class="grid-label">동적(Dynamic)</span>
  </div>

  <main id="projects">

    <div class="cell">
      <div class="cell-preview">
        <iframe src="sample1/index.html" loading="lazy" title="과제 1"></iframe>
      </div>
      <div class="cell-meta">
        <div class="cell-info">
          <span class="cell-number">ASSIGNMENT 01</span>
          <span class="cell-title">과제 1</span>
        </div>
        <div class="cell-right">
          <span class="cell-tag tag-static">static</span>
          <a class="open-link" href="sample1/index.html" target="_blank">전체화면 →</a>
        </div>
      </div>
    </div>

    <div class="cell">
      <div class="cell-preview">
        <iframe src="sample4/index.html" loading="lazy" title="과제 4" class="interactive"></iframe>
      </div>
      <div class="cell-meta">
        <div class="cell-info">
          <span class="cell-number">ASSIGNMENT 04</span>
          <span class="cell-title">과제 4</span>
        </div>
        <div class="cell-right">
          <span class="cell-tag tag-dynamic">dynamic</span>
          <a class="open-link" href="sample4/index.html" target="_blank">전체화면 →</a>
        </div>
      </div>
    </div>

    <div class="cell">
      <div class="cell-preview">
        <iframe src="sample2/index.html" loading="lazy" title="과제 2"></iframe>
      </div>
      <div class="cell-meta">
        <div class="cell-info">
          <span class="cell-number">ASSIGNMENT 02</span>
          <span class="cell-title">과제 2</span>
        </div>
        <div class="cell-right">
          <span class="cell-tag tag-static">static</span>
          <a class="open-link" href="sample2/index.html" target="_blank">전체화면 →</a>
        </div>
      </div>
    </div>

    <div class="cell">
      <div class="cell-preview">
        <iframe src="sample3/index.html" loading="lazy" title="과제 3" class="interactive"></iframe>
      </div>
      <div class="cell-meta">
        <div class="cell-info">
          <span class="cell-number">ASSIGNMENT 03</span>
          <span class="cell-title">과제 3</span>
        </div>
        <div class="cell-right">
          <span class="cell-tag tag-dynamic">dynamic</span>
          <a class="open-link" href="sample3/index.html" target="_blank">전체화면 →</a>
        </div>
      </div>
    </div>

  </main>
</section>

<footer>
  <span class="footer-text">p5.js Portfolio · 2025</span>
  <div class="footer-dots">
    <div class="footer-dot"></div>
    <div class="footer-dot"></div>
    <div class="footer-dot"></div>
  </div>
</footer>

<script>
  function scaleIframes() {
    document.querySelectorAll('.cell-preview').forEach(preview => {
      const iframe = preview.querySelector('iframe');
      if (!iframe) return;
      const w = preview.clientWidth;
      const h = preview.clientHeight;
      const scale = Math.min(w / 800, h / 600);
      iframe.style.transform = `scale(${scale})`;
    });
  }
  window.addEventListener('load', scaleIframes);
  window.addEventListener('resize', scaleIframes);
</script>

</body>
</html>
